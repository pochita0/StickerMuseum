<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="description" content="액자 속 스티커팩을 둘러보는 Sticker Museum 갤러리입니다.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Sticker Museum">
  <meta property="og:description" content="액자 속 스티커팩을 둘러보는 Sticker Museum 갤러리입니다.">
  <meta property="og:image" content="https://sticker-museum.vercel.app/site-thumbnail.jpg?v=20260316d">
  <meta property="og:image:width" content="1080">
  <meta property="og:image:height" content="1080">
  <meta property="og:image:alt" content="Sticker Museum thumbnail">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Sticker Museum">
  <meta name="twitter:description" content="액자 속 스티커팩을 둘러보는 Sticker Museum 갤러리입니다.">
  <meta name="twitter:image" content="https://sticker-museum.vercel.app/site-thumbnail.jpg?v=20260316d">
  <title>Sticker Museum</title>
  <link rel="icon" type="image/jpeg" href="./site-thumbnail.jpg?v=20260316d">
  <link rel="apple-touch-icon" href="./site-thumbnail.jpg?v=20260316d">
  <link rel="preload" href="./gallery_scene_wall_refined4.png?v=20260316b" as="image">
  <link rel="stylesheet" href="./gallery.css?v=20260316b">
</head>

<body class="gallery-page">
  <div class="gallery-backdrop" aria-hidden="true">
    <img src="./gallery_scene_wall_refined4.png?v=20260316b" alt="">
  </div>

  <main class="gallery-stage-wrap">
    <h1 class="sr-only">Sticker Museum Gallery</h1>
    <section class="gallery-stage" id="galleryStage" aria-label="스티커 갤러리">
      <div class="gallery-scene-layer" id="gallerySceneLayer">
        <img class="gallery-scene" id="galleryScene" alt="액자가 전시된 스티커 뮤지엄 전경" draggable="false">
        <div class="gallery-light-layer" id="galleryLightLayer" aria-hidden="true"></div>
        <div class="gallery-hit-layer" id="galleryHitLayer" aria-label="전시 액자 목록"></div>
      </div>
    </section>
  </main>

  <aside class="gallery-controls" aria-label="갤러리 조명 조절">
    <label class="gallery-control-panel" for="galleryDarkness">
      <span class="gallery-control-panel__icon" aria-hidden="true">Light</span>
      <input
        class="gallery-control-panel__slider"
        id="galleryDarkness"
        type="range"
        min="0"
        max="100"
        value="72"
        step="1"
        aria-label="배경 어둡기"
      >
    </label>
    <a
      class="gallery-contact-button"
      href="https://t.me/StickerOrnn"
      target="_blank"
      rel="noreferrer noopener"
      aria-label="문의하기"
      title="문의하기"
    >
      문의
    </a>
  </aside>

  <script type="module" src="./gallery.js?v=20260316b"></script>
</body>

</html>
