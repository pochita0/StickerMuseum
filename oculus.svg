      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.24" stop-color="#edf0f3"/>
      <stop offset="0.54" stop-color="#c4cad1"/>
      <stop offset="0.76" stop-color="#eef1f4"/>
      <stop offset="1" stop-color="#afb7c0"/>
    </linearGradient>
    <linearGradient id="shaftWall" x1="800" y1="320" x2="800" y2="1280" gradientUnits="userSpaceOnUse">
