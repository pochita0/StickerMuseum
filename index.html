<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>3D Sticker Museum - Round Room</title>
  <link rel="preload" href="./marble_tile.png?v=20260309" as="image">
  <link rel="stylesheet" href="./styles.css?v=20260309">
</head>

<body class="app-loading">
  <div class="scene">
    <div class="room" id="room">
      <div class="room-walls" id="roomWalls">
        <!-- Geodesic dome ceiling (built by JS) -->
        <div class="ceiling-dome" id="ceilingDome"></div>
        <div class="ceiling-cornice"></div>

        <!-- 7 walls -->
        <div class="wall wall-pane w--3" id="wall_minus3"></div>
        <div class="wall wall-pane w--2" id="wall_minus2"></div>
        <div class="wall wall-pane w--1" id="wall_minus1"></div>
        <div class="wall wall-pane w-0" id="wall_0"></div>
        <div class="wall wall-pane w-1" id="wall_1"></div>
        <div class="wall wall-pane w-2" id="wall_2"></div>
        <div class="wall wall-pane w-3" id="wall_3"></div>
      </div>
      <!-- Marble Floor -->
      <div class="floor"></div>
    </div>
  </div>

  <!-- Vignette -->
  <div class="vignette"></div>

  <script src="./script.js?v=20260309"></script>
</body>

</html>
